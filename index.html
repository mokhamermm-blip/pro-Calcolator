
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Phone Calc</title>
    <style>
        :root {
            --bg: #000000;
            --phone-frame: #1a1a1a;
            --accent: #38bdf8;
            --btn-bg: #262626;
        }

        body {
            background-color: var(--bg);
            height: 100vh; margin: 0;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* MEDIUM SIZE PHONE FRAME */
        .phone {
            width: 320px; /* Medium width */
            height: 620px; /* Medium height */
            background: var(--phone-frame);
            border-radius: 40px;
            border: 3px solid #333;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        .notch {
            width: 80px; height: 18px;
            background: #000; border-radius: 15px;
            margin: 5px auto 12px;
        }

        .screen {
            flex: 1; background: #050505;
            border-radius: 28px;
            padding: 15px;
            display: flex; flex-direction: column;
            border: 1px solid #222;
            box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .display {
            width: 100%; border: none; background: transparent;
            color: var(--accent); font-size: 2.8rem; /* Scaled text */
            text-align: right; outline: none;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px var(--accent);
            margin-top: auto; margin-bottom: 15px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; /* Medium spacing */
        }

        button {
            height: 60px; /* Medium button height */
            border: none; border-radius: 50%;
            background: var(--btn-bg); color: #fff;
            font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: all 0.1s;
        }

        /* CLICK LIGHT EFFECT */
        button:active {
            transform: scale(0.92);
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent);
        }

        .op { color: var(--accent); background: #1a202c; }
        .clear { color: #f87171; background: #2d1a1a; }
        .equals {
            background: var(--accent); color: #000;
            grid-column: span 2; border-radius: 30px;
        }
    </style>
</head>
<body>

    <div class="phone">
        <div class="notch"></div>
        <div class="screen">
            <input type="text" class="display" id="screen" disabled placeholder="0">

            <div class="keypad">
                <button class="clear" onclick="clearScreen()">AC</button>
                <button onclick="deleteLast()">⌫</button>
                <button class="op" onclick="add('%')">%</button>
                <button class="op" onclick="add('/')">÷</button>
                
                <button onclick="add('7')">7</button>
                <button onclick="add('8')">8</button>
                <button onclick="add('9')">9</button>
                <button class="op" onclick="add('*')">×</button>
                
                <button onclick="add('4')">4</button>
                <button onclick="add('5')">5</button>
                <button onclick="add('6')">6</button>
                <button class="op" onclick="add('-')">−</button>
                
                <button onclick="add('1')">1</button>
                <button onclick="add('2')">2</button>
                <button onclick="add('3')">3</button>
                <button class="op" onclick="add('+')">+</button>
                
                <button onclick="add('0')">0</button>
                <button onclick="add('.')">.</button>
                <button class="equals" onclick="solve()">=</button>
            </div>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        function add(v) { 
            if(screen.value === 'Error') screen.value = '';
            screen.value += v; 
        }
        function clearScreen() { screen.value = ''; }
        function deleteLast() { screen.value = screen.value.slice(0, -1); }
        function solve() {
            try {
                let result = new Function('return ' + screen.value)();
                screen.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(4));
            } catch { screen.value = 'Error'; }
        }
    </script>
</body>
</html>
